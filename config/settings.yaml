# IPL Strategic Intelligence Platform - Production Config
# HDFS is the primary storage layer. Spark is the core processing engine.

env: dev

# Data Lake - HDFS (MANDATORY for production)
# All zones live on HDFS: hdfs://<namenode>:<rpc_port>/ipl/...
hdfs:
  base_uri: "hdfs://localhost:9000"
  raw_path: "/ipl/raw"
  processed_path: "/ipl/processed"
  features_path: "/ipl/features"
  analytics_path: "/ipl/analytics"
  models_path: "/ipl/models"
  # WebHDFS for API upload (Namenode HTTP)
  webhdfs_host: "localhost"
  webhdfs_port: 9870

# Spark - centralized config for all jobs
spark:
  app_name: "IPL-Strategic-Platform"
  master: "local[*]"
  shuffle_partitions: 16
  executor_memory: "2g"
  driver_memory: "1g"
  sql_adaptive_enabled: true
  default_parallelism: 8

# API
api:
  host: "0.0.0.0"
  port: 8000
  reload: true
  workers: 1
  # Path to spark-submit (for triggering ETL/Analytics/ML jobs)
  spark_submit_path: "spark-submit"

# Dashboard
dashboard:
  port: 8501

# ML (Spark ML)
ml:
  train_test_ratio: 0.2
  random_state: 42
  model_version: "v1"

# Local fallback (dev only; primary is HDFS)
local:
  analytics_path: "data/analytics"

# Logging
logging:
  level: "INFO"
  format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"
